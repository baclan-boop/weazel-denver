# fly.toml — Weazel News
app = "weazel-news"
primary_region = "ams"

[build]
  [build.args]
    NODE_ENV = "production"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

# Примечание: сейчас сайт деплоится на Render (см. README.md), этот файл
# используется только если снова понадобится деплой на Fly.io.
# destination исправлен на /app/uploads — раньше был /app/data, а
# приложение пишет локальные файлы (fallback, если Cloudinary не настроен,
# см. src/config.js → UPLOADS_DIR) именно в /app/uploads, так что старый
# путь монтирования никогда реально не использовался для персистентности.
[[mounts]]
  source = "weazel_data"
  destination = "/app/uploads"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
